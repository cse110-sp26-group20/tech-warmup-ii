<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot MVP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>🎰 Slot MVP</h1>
            <div id="wallet">Balance: <span id="balance-display">0</span>🪙</div>
        </header>
        
        <main>
            <div id="grid-display">
                <!-- Grid rows and cells injected via JS -->
            </div>
            
            <div id="controls">
                <button id="spin-button">SPIN (Bet: 10)</button>
            </div>
            
            <div id="message-container">
                <p id="message-display">Loading...</p>
            </div>
        </main>
    </div>

    <!-- Use type="module" so we can use ES6 imports in manager.js -->
    <script type="module" src="manager.js"></script>
</body>
</html>
